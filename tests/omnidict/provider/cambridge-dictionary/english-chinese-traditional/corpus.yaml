entries:
- headword: corpus
  part_of_speech: noun [ C ]
  pronunciations:
  - audio_file_name: ukcorps004.mp3
    phonemic_transcription: /ˈkɔː.pəs/
    region: UK
  - audio_file_name: uscorin028.mp3
    phonemic_transcription: /ˈkɔːr.pəs/
    region: US
  senses:
  - definition: a collection of written or spoken material stored on a computer and
      used to find out how language is used
    examples:
    - sentence: All the dictionary examples are taken from a corpus of billions of
        words.
      translation: 字典中的所有例子都取自一個收錄了數十億詞彙的語料庫。
    features: null
    translation: 語料庫，詞料庫
  - definition: a collection of a single writer's work, or of writing about a particular
      subject
    examples: []
    features: null
    translation: 文集，全集
  - definition: a body or the main part of an organ
    examples: []
    features: medical specialized
    translation: 身體，軀體
