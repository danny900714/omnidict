entries:
- part_of_speech: verb
  pronunciations:
  - audio_file_name: uksland017.mp3
    phonemic_transcription: /slæʃ/
    region: UK
  - audio_file_name: slash.mp3
    phonemic_transcription: /slæʃ/
    region: US
  senses:
  - definition: to cut with a sharp blade using a quick, strong movement
    examples:
    - sentence: The museum was broken into last night and several paintings were slashed.
      translation: 昨晚有人闖進了博物館，有幾幅畫被劃破了。
    - sentence: She tried to commit suicide by slashing her wrists.
      translation: 她試圖割腕自殺。
    - sentence: We had to slash (our way) through the long grass to clear a path.
      translation: 我們不得不在茂盛的草叢裡踩出一條通道。
    features: '[ I or T ]'
    translation: （用利器）劈，砍，劃
  - definition: to very much reduce something, such as money or jobs
    examples:
    - sentence: Prices have been slashed by 50 percent!
      translation: 價格直降50%！
    features: '[ T ] informal'
    translation: 大幅削減，大幅減少（金錢、工作等）
- part_of_speech: noun
  pronunciations:
  - audio_file_name: uksland017.mp3
    phonemic_transcription: /slæʃ/
    region: UK
  - audio_file_name: slash.mp3
    phonemic_transcription: /slæʃ/
    region: US
  senses:
  - definition: the symbol / used in writing to separate letters, numbers, or words
    examples:
    - sentence: You often write a slash between alternatives, for example, "and/or".
      translation: 通常在選擇項之間會加斜線，比如「和／或」。
    features: '[ C ] (UK also oblique (stroke))'
    translation: 斜線
  - definition: used to mean "or", or to show that something has two uses
    examples:
    - sentence: The room functions as a guest bedroom slash study.
      translation: 這間屋子用作客房或書房。
    features: '[ C ] spoken (UK also oblique (stroke))'
    translation: 原意為「斜線號」，表示「或者」
  - definition: a long, deep cut
    examples: []
    features: null
    translation: （長而深的）劃痕，切口
  - definition: a fast, long movement to hit something
    examples:
    - sentence: Ben took a wild slash at the ball and luckily managed to hit it.
      translation: 班拼命地揮棒擊球，居然幸運地擊中了。
    features: '[ C ]'
    translation: 抽打;揮擊
  - definition: a decorative opening in a piece of clothing, often with a different
      colour showing through it
    examples:
    - sentence: My new dress is pale blue, with a dark blue slash in the sleeves.
      translation: 我的新衣服是淡藍色的，在袖口上有一個深藍色的裝飾性開叉。
    features: '[ C ]'
    translation: （衣服上的）裝飾性開叉（常有不同的顏色透過開叉顯示出來）
  - definition: the act of going to the toilet and urinating
    examples: []
    features: '[ S ] UK slang'
    translation: 撒尿
word: slash
