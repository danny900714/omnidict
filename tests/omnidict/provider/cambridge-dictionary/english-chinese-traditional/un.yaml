entries:
- headword: the UN
  part_of_speech: noun [ + sing/pl verb ]
  pronunciations:
  - audio_file_name: uka31519.mp3
    phonemic_transcription: /ˌjuːˈen/
    region: UK
  - audio_file_name: usa31519.mp3
    phonemic_transcription: /ˌjuːˈen/
    region: US
  senses:
  - definition: 'abbreviation for the United Nations: an international organization
      that was established in 1945 and aims to solve world problems in a peaceful
      way'
    examples:
    - sentence: The UN has decided to impose sanctions.
      translation: 聯合國已決定實施制裁。
    features: null
    translation: 聯合國（the United Nations的縮寫）
- headword: un-
  part_of_speech: prefix
  pronunciations:
  - audio_file_name: epd33188.mp3
    phonemic_transcription: /ʌn-/
    region: UK
  - audio_file_name: usugand019.mp3
    phonemic_transcription: /ʌn-/
    region: US
  senses:
  - definition: used to add the meaning "not", "lacking", or "the opposite of" before
      adjectives, adverbs, verbs, and nouns
    examples:
    - sentence: unrealistic
      translation: 不現實的
    - sentence: unhappily
      translation: 不幸地
    - sentence: unscrew
      translation: 擰鬆;旋開
    - sentence: unfairness
      translation: 不公平
    features: null
    translation: （加在形容詞、副詞、動詞和名詞前表示「否定」，「缺乏」或「相反」之意）不，無，反，非
- headword: UN
  part_of_speech: adjective [ before noun ]
  pronunciations:
  - audio_file_name: epd33189.mp3
    phonemic_transcription: /ˌjuːˈen/
    region: UK
  - audio_file_name: eus74688.mp3
    phonemic_transcription: /ˌjuːˈen/
    region: US
  senses:
  - definition: relating to the UN (= the United Nations)
    examples:
    - sentence: the UN Security Council
      translation: 聯合國安全理事會
    - sentence: UN troops
      translation: 聯合國部隊
    features: null
    translation: 聯合國的
- headword: '''un'
  part_of_speech: noun [ C ]
  pronunciations:
  - audio_file_name: ukumpir005.mp3
    phonemic_transcription: /ən/
    region: UK
  - audio_file_name: usugand019.mp3
    phonemic_transcription: /ən/
    region: US
  senses:
  - definition: one
    examples:
    - sentence: Mira will fit in the back of the car - she's only a little 'un!
      translation: 米拉可以擠進車後排——她只是個小不點兒！
    features: not standard
    translation: 一（個）
