entries:
- headword: bug
  part_of_speech: noun
  pronunciations:
  - audio_file_name: ukbuddh018.mp3
    phonemic_transcription: /bʌɡ/
    region: UK
  - audio_file_name: bug.mp3
    phonemic_transcription: /bʌɡ/
    region: US
  senses:
  - definition: a very small insect
    examples: []
    features: '[ C ]'
    translation: 小蟲子
  - definition: 'an illness that is usually not serious and is caused by bacteria
      or a virus '
    examples:
    - sentence: I had a tummy/stomach bug last week.
      translation: 上週我的腸胃出了點小毛病。
    - sentence: There's a bug going around (= an illness that many people are getting).
      translation: 有種細菌引起的疾病現正在流行。
    features: '[ C ] informal'
    translation: （引起小毛病的）細菌;病毒
  - definition: a mistake or problem in a computer program
    examples:
    - sentence: A bug caused the company's computer system to crash.
      translation: 程式缺陷導致公司的電腦系統崩潰。
    features: '[ C ]'
    translation: （電腦程式中出現的）缺陷，漏洞
  - definition: a very small device fixed on to a phone or hidden in a room, that
      allows you to listen to what people are saying without them knowing
    examples: []
    features: '[ C ]'
    translation: 竊聽器
  - definition: a very strong enthusiasm for something
    examples:
    - sentence: He's been bitten by the sailing bug.
      translation: 他迷上了帆船運動。
    features: '[ S ] informal'
    translation: 熱衷；迷戀
- headword: bug
  part_of_speech: verb [ T ]
  pronunciations:
  - audio_file_name: ukbuddh018.mp3
    phonemic_transcription: /bʌɡ/
    region: UK
  - audio_file_name: bug.mp3
    phonemic_transcription: /bʌɡ/
    region: US
  senses:
  - definition: to annoy or worry someone
    examples:
    - sentence: He's been bugging me all morning.
      translation: 他整個上午都在煩我。
    features: informal
    translation: 煩擾;使…擔心
  - definition: to place or hide a listening device inside something
    examples:
    - sentence: She suspected that her phone had been bugged.
      translation: 她懷疑自己的電話被人竊聽了。
    features: null
    translation: 秘密安裝竊聽裝置
