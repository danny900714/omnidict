entries:
- headword: man
  part_of_speech: noun
  pronunciations:
  - audio_file_name: ukmammo003.mp3
    phonemic_transcription: /mæn/
    region: UK
  - audio_file_name: eus72888.mp3
    phonemic_transcription: /mæn/
    region: US
  senses:
  - definition: an adult male human being
    examples:
    - sentence: a young/tall man
      translation: 年輕／高個子的男子
    - sentence: men and women
      translation: 男人和女人
    - sentence: the man in the green jacket
      translation: 穿綠夾克的男子
    - sentence: For a very long time, only men could join the armed forces.
      translation: null
    - sentence: Steve can solve anything - the man's a genius.
      translation: 史蒂夫甚麼疑難都解決得到——此人是個天才。
    features: '[ C ]'
    translation: 成年男子，男人
  - definition: a male employee
    examples:
    - sentence: The gas company said they would send some men to fix the leak.
      translation: 煤氣公司說會派人來解決洩漏問題。
    - sentence: The man from the newspaper wrote some positive things about the movie.
      translation: 報社來的人對影片作了正面的評價。
    - sentence: Our man in Washington sent us the news by fax yesterday.
      translation: 我們駐華盛頓的同事昨天把這個消息傳真過來。
    features: '[ C ]'
    translation: （沒有明確職位或頭銜的）男性員工
  - definition: a male servant
    examples:
    - sentence: My man will show you to the door.
      translation: 我的男僕會送您到門口。
    features: '[ C ] old-fashioned'
    translation: 男僕
  - definition: a husband or male sexual partner
    examples:
    - sentence: I hear she's got a new man.
      translation: 我聽說她找了個新男朋友。
    - sentence: Is there a man in her life?
      translation: 她有男人嗎？
    features: '[ C ] informal'
    translation: 丈夫;情夫;男朋友
  - definition: used when talking to someone, especially a man
    examples:
    - sentence: Hey, man, how are you doing?
      translation: 嘿，老兄，你好嗎？
    features: mainly US informal
    translation: （用於稱呼，尤指對男子）老兄，老弟，小夥子，朋友
  - definition: the human race
    examples:
    - sentence: Man is still far more intelligent than the smartest robot.
      translation: 人類仍遠比最有智慧的機器人聰明。
    - sentence: Man is rapidly destroying the earth.
      translation: 人類正迅速毀滅地球。
    - sentence: This is one of the most dangerous substances known to man.
      translation: 這是人類已知的最危險的物質之一。
    - sentence: Try to imagine what life must have been like for Neolithic man 10,000
        years ago.
      translation: 想像一下一萬年前新石器時代的人的生活是甚麼樣子。
    features: '[ U ]'
    translation: 人類，人
  - definition: a person
    examples:
    - sentence: All men are equal in the sight of the law.
      translation: 法律面前人人平等。
    features: '[ C ] literary or old-fashioned'
    translation: （不論性別的）人
  - definition: any of the objects that are moved or played with in games such as
      chess
    examples: []
    features: '[ C ]'
    translation: （西洋棋等遊戲中的）棋子
- headword: man
  part_of_speech: verb [ T ]
  pronunciations:
  - audio_file_name: ukmammo003.mp3
    phonemic_transcription: /mæn/
    region: UK
  - audio_file_name: eus72888.mp3
    phonemic_transcription: /mæn/
    region: US
  senses:
  - definition: To man something such as a machine or vehicle is to be present in
      order to operate it.
    examples:
    - sentence: The phones are manned 24 hours a day.
      translation: 電話每天24小時都有人值班。
    - sentence: Man the pumps!
      translation: 派人看著抽水機！
    features: null
    translation: 為…配備人手
- headword: man
  part_of_speech: exclamation
  pronunciations:
  - audio_file_name: ukmammo003.mp3
    phonemic_transcription: /mæn/
    region: UK
  - audio_file_name: eus72888.mp3
    phonemic_transcription: /mæn/
    region: US
  senses:
  - definition: used to express a strong emotion
    examples:
    - sentence: Man, we had a good time - we drank all through the night!
      translation: 嘿，我們昨晚真是盡興，喝了一夜的酒！
    features: informal
    translation: （用作感歎詞，尤用於表示強烈的感情）啊，呀，哈，嘿
- headword: -man
  part_of_speech: suffix
  pronunciations:
  - audio_file_name: ukmammo003.mp3
    phonemic_transcription: / -mæn/
    region: UK
  - audio_file_name: eus72888.mp3
    phonemic_transcription: / -mæn/
    region: US
  senses:
  - definition: having the nationality or job mentioned, or (of a group or vehicle)
      containing the number of people mentioned
    examples:
    - sentence: an Irishman
      translation: 愛爾蘭人
    - sentence: a policeman
      translation: 員警
    - sentence: businessmen
      translation: 商人
    - sentence: a five-man team
      translation: 五人小組
    - sentence: a two-man helicopter
      translation: 雙人直升機
    features: null
    translation: …國人；做…職業的人；（團體）由…人組成的；（交通工具）可載…人的
