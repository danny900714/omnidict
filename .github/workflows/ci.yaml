name: CI

on:
  push:
    branches:
      - main
      - gh-actions
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v6
      - &install-deps
        name: Install dependencies
        run: sudo apt update && sudo apt install -y gettext libegl1
      - &setup-python
        name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - &install-uv
        name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Sync dependencies
        run: uv sync --locked
      - &export-runtime-deps
        name: Export runtime dependencies
        run: uv export --no-dev --format requirements.txt -o requirements_prod.txt
      - &install-runtime-deps
        name: Install runtime dependencies into add-on's vendor directory
        run: uv pip install -r requirements_prod.txt -t src/omnidict/vendor
      - &compile-po
        name: Compile gettext portable objects
        run: uv run scripts/compile_portable_objects.py
      - name: Package add-on
        working-directory: src/omnidict
        run: zip -r ../../OmniDict.ankiaddon *
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OmniDict.ankiaddon
          path: OmniDict.ankiaddon
          archive: false

  test:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *install-deps
      - *setup-python
      - *install-uv
      - name: Sync dependencies
        run: uv sync --locked --all-extras
      - *export-runtime-deps
      - *install-runtime-deps
      - *compile-po
      - name: Run tests
        run: uv run pytest --junit-xml=pytest-junit.xml
      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: pytest-junit.xml
