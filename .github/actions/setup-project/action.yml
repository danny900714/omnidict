name: Setup Project
author: danny900714
description: Setup project environment for GitHub workflows
runs:
  using: composite
  steps:
    - name: Install dependencies
      run: sudo apt update && sudo apt install -y gettext libegl1
      shell: bash
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version
    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Sync dependencies
      run: uv sync --locked --all-extras
      shell: bash
    - name: Export provided dependencies that are excluded when installing runtime dependencies
      run: uv export --only-group provided -o requirements_provided.txt
      shell: bash
    - name: Install runtime dependencies into add-on's vendor directory
      run: uv export --no-dev | uv pip install -r - --exclude requirements_provided.txt -t src/omnidict/vendor
      shell: bash
    - name: Compile gettext portable objects
      run: uv run scripts/compile_portable_objects.py
      shell: bash
